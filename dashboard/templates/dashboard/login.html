{% extends 'dashboard/base.html' %}
{% block content %}
<div style="display:flex;flex-direction:column;align-items:center;gap:1.5rem;">
    <div style="width:100%;text-align:center;">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin-bottom:0.5em;"><rect width="48" height="48" rx="12" fill="#0078d7"/><path d="M24 14a10 10 0 1 1 0 20 10 10 0 0 1 0-20zm0 2a8 8 0 1 0 0 16 8 8 0 0 0 0-16zm0 3a5 5 0 0 1 5 5h-2a3 3 0 1 0-6 0h-2a5 5 0 0 1 5-5z" fill="#fff"/></svg>
        <h2 style="margin:0;font-size:1.5rem;color:#0078d7;">LAN Dashboard Login</h2>
        <p style="color:#555;font-size:1rem;margin:0.5em 0 1.5em 0;">Sign in to access your local dashboard</p>
    </div>
    <form method="post" style="width:100%;max-width:340px;background:#f7f9fc;padding:2em 1.2em;border-radius:14px;box-shadow:0 2px 8px rgba(0,0,0,0.04);">
        {% csrf_token %}
        <label for="username">Username</label>
        <input type="text" name="username" id="username" required autocomplete="username">
        <label for="password">Password</label>
        <input type="password" name="password" id="password" required autocomplete="current-password">
        <button class="button" type="submit" style="margin-top:1em;">Login</button>
        {% if form.errors %}
            <div style="color:#d32f2f;margin-top:1em;text-align:center;">Invalid credentials.</div>
        {% endif %}
    </form>
    <div style="font-size:0.95em;color:#888;text-align:center;">LAN-only access &mdash; Secure &amp; Offline</div>
</div>
{% endblock %}
