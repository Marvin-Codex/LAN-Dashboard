{% extends 'dashboard/base.html' %}
{% block content %}
<style>
.phone-mouse-container {
  max-width: 420px;
  margin: 2em auto;
  padding: 1.5em 1em;
  background: #f7f9fc;
  border-radius: 18px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.07);
  display: flex;
  flex-direction: column;
  align-items: center;
}
.phone-mouse-title {
  color: #0078d7;
  font-size: 2rem;
  font-weight: 700;
  margin-bottom: 1.2em;
}
#touchpad {
  width: 100%;
  height: 320px;
  background: #fff;
  border-radius: 14px;
  border: 2px solid #00b4d8;
  margin-bottom: 1.2em;
  touch-action: none;
  box-shadow: 0 1px 8px rgba(0,120,215,0.08);
  position: relative;
  overflow: hidden;
}
#touch-indicator {
  position: absolute;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: rgba(0,120,215,0.13);
  border: 2px solid #00b4d8;
  pointer-events: none;
  display: none;
  z-index: 2;
  transform: translate(-50%, -50%);
}
.phone-mouse-btns {
  display: flex;
  gap: 1.2em;
  width: 100%;
  justify-content: center;
}
.phone-mouse-btn {
  flex: 1;
  padding: 1em 0;
  font-size: 1.15em;
  font-weight: 600;
  border-radius: 10px;
  border: none;
  background: linear-gradient(90deg,#00b4d8 0%,#0078d7 100%);
  color: #fff;
  box-shadow: 0 2px 8px rgba(0,120,215,0.10);
  transition: filter 0.13s, box-shadow 0.13s;
}
.phone-mouse-btn:active, .phone-mouse-btn.active {
  filter: brightness(0.93);
  box-shadow: 0 0 0 4px #90e0ef;
}
.sensitivity-row {
  width: 100%;
  margin: 1.2em 0 0.5em 0;
  display: flex;
  align-items: center;
  gap: 0.7em;
}
.sensitivity-label {
  font-size: 1em;
  color: #0078d7;
  font-weight: 500;
}
.sensitivity-slider {
  flex: 1;
}
.sensitivity-value {
  min-width: 2.5em;
  text-align: right;
  color: #0078d7;
  font-weight: 600;
}
</style>
<div class="phone-mouse-container">
  <div class="phone-mouse-title">Phone Mouse (Admin Only)</div>
  <div class="sensitivity-row">
    <span class="sensitivity-label">Sensitivity</span>
    <input type="range" min="0.5" max="3" step="0.05" value="1.5" id="sensitivitySlider" class="sensitivity-slider">
    <span class="sensitivity-value" id="sensitivityValue">1.5x</span>
  </div>
  <div id="touchpad">
    <div id="touch-indicator"></div>
  </div>
  <div class="phone-mouse-btns">
    <button class="phone-mouse-btn" id="leftBtn">Left Click</button>
    <button class="phone-mouse-btn" id="rightBtn">Right Click</button>
  </div>
</div>
<script>
const ws_scheme = window.location.protocol === "https:" ? "wss" : "ws";
const ws_url = ws_scheme + '://' + window.location.host + '/ws/phone-mouse/';
const socket = new WebSocket(ws_url);
let lastX = null, lastY = null, isDown = false;
let lastSend = 0;
let sensitivity = 1.5;
const touchpad = document.getElementById('touchpad');
const indicator = document.getElementById('touch-indicator');
const slider = document.getElementById('sensitivitySlider');
const sliderValue = document.getElementById('sensitivityValue');

slider.addEventListener('input', function() {
  sensitivity = parseFloat(slider.value);
  sliderValue.textContent = sensitivity.toFixed(2) + 'x';
});

function showIndicator(x, y) {
  indicator.style.left = x + 'px';
  indicator.style.top = y + 'px';
  indicator.style.display = 'block';
  indicator.style.opacity = '1';
  clearTimeout(indicator._timeout);
  indicator._timeout = setTimeout(() => {
    indicator.style.opacity = '0';
    setTimeout(() => { indicator.style.display = 'none'; }, 200);
  }, 200);
}

function throttle(fn, limit) {
  let lastCall = 0;
  return function(...args) {
    const now = Date.now();
    if (now - lastCall >= limit) {
      lastCall = now;
      fn.apply(this, args);
    }
  };
}

const sendMove = throttle(function(dx, dy) {
  socket.send(JSON.stringify({action: 'move', dx: Math.round(dx * sensitivity), dy: Math.round(dy * sensitivity)}));
}, 18); // ~55fps max

touchpad.addEventListener('touchstart', function(e) {
  if (e.touches.length === 1) {
    const rect = touchpad.getBoundingClientRect();
    lastX = e.touches[0].clientX;
    lastY = e.touches[0].clientY;
    isDown = true;
    showIndicator(lastX - rect.left, lastY - rect.top);
  }
});
touchpad.addEventListener('touchmove', function(e) {
  if (isDown && e.touches.length === 1) {
    const rect = touchpad.getBoundingClientRect();
    const x = e.touches[0].clientX;
    const y = e.touches[0].clientY;
    const dx = x - lastX;
    const dy = y - lastY;
    lastX = x;
    lastY = y;
    sendMove(dx, dy);
    showIndicator(x - rect.left, y - rect.top);
    e.preventDefault();
  }
});
touchpad.addEventListener('touchend', function(e) {
  isDown = false;
  indicator.style.opacity = '0';
  setTimeout(() => { indicator.style.display = 'none'; }, 200);
});
function clickFeedback(btn) {
  btn.classList.add('active');
  setTimeout(() => btn.classList.remove('active'), 180);
}
document.getElementById('leftBtn').addEventListener('click', function() {
  socket.send(JSON.stringify({action: 'click', button: 'left'}));
  clickFeedback(this);
});
document.getElementById('rightBtn').addEventListener('click', function() {
  socket.send(JSON.stringify({action: 'click', button: 'right'}));
  clickFeedback(this);
});
</script>
{% endblock %}
